<!DOCTYPE html>
<html lang="en" data-page="surface">
<head>
<meta charset="UTF-8">
<title>Pink Teaming · A Manifesto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css?v=3">
<script src="nav.js?v=3" defer></script>
<style>
/* ════════════════════════════════════════════════════════════
   PINK TEAMING — gateway (root)
   The gateway is a thin pointer. Right now it morphs the nav
   from SURFACE to TEXT and redirects to /manifesto/, which is
   the intended first encounter. Later, point this elsewhere by
   editing only this file.
   ════════════════════════════════════════════════════════════ */

:root {
  --paper: #fafaf7;
  --ink:   #000000;
  --pink:  #ff1493;

  --font-serif: 'Newsreader', Georgia, 'Times New Roman', serif;
  --font-sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:  'JetBrains Mono', 'Menlo', monospace;

  /* Slow the nav morph just for the gateway so the simultaneous
     pink fill has room to feel deliberate. nav.js reads this var. */
  --nav-transition-duration: 2500ms;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-serif);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  /* Pink fill runs in lockstep with the star morph. */
  transition: background-color 2500ms cubic-bezier(0.4, 0, 0.2, 1);
}
body.transitioning { background: var(--pink); }

/* ── Identity chip — matches the chip on every other page ── */
.chip {
  position: fixed;
  top: 1.25rem; left: 1.25rem;
  z-index: 100;
  display: inline-flex; align-items: center; gap: 0.55rem;
  padding: 0.55rem 0.95rem;
  background: var(--paper);
  border: 1px solid var(--ink);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  white-space: nowrap;
}
.chip .dot {
  width: 7px; height: 7px;
  background: var(--pink);
  animation: breathe 2.4s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{opacity:.45} 50%{opacity:1} }

/* Reduced motion: keep things still. The script also short-circuits
   the morph and redirects after a brief pause. */
@media (prefers-reduced-motion: reduce) {
  body { transition: none; }
  .chip .dot { animation: none; opacity: 1; }
}
</style>
</head>
<body>

<div class="chip"><span class="dot"></span>Pink Teaming · A Manifesto</div>

<script>
(function () {
  const DESTINATION = '/manifesto/';
  const PAUSE_MS    = 500;   // visitor sees the surface state first
  const SAFETY_MS   = 3400;  // fallback if nav.js's redirect is interrupted
  // Tells /manifesto/ to fade in instead of jumping. One-shot flag —
  // /manifesto/ clears it on read, so direct visits never fade.
  const ARRIVAL_KEY = 'pt.gateway-arrival';

  const reducedMotion = window.matchMedia &&
    window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function go() {
    // replace() so Back doesn't return to the gateway and re-trigger.
    window.location.replace(DESTINATION);
  }

  if (reducedMotion) {
    setTimeout(go, 250);
    return;
  }

  function start() {
    if (!window.NavObject || typeof window.NavObject.navigate !== 'function') {
      return setTimeout(start, 30);
    }
    // If the visitor clicks an arm during the pause, let nav.js handle
    // it normally. Otherwise auto-morph from SURFACE to TEXT.
    setTimeout(function () {
      if (window.NavObject.getActive() !== 'surface') return; // visitor clicked
      try { sessionStorage.setItem(ARRIVAL_KEY, '1'); } catch (_) {}
      document.body.classList.add('transitioning');
      // keepAngles:true → morph only arm lengths, not orientation.
      // nav.js auto-redirects when the morph completes (~2.55s after
      // this call), and /manifesto/ fades in on the other side.
      window.NavObject.navigate('text', { keepAngles: true });
      setTimeout(go, SAFETY_MS);
    }, PAUSE_MS);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>

</body>
</html>
